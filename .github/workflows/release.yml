name: Release to VS Code Marketplace

on:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  lfs: true

            - name: Setup Node.js 22.22.3
              uses: actions/setup-node@v4
              with:
                  node-version: '22.22.3'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

            - name: Compile TypeScript
              run: npm run compile

            - name: Package extension
              run: npm run package

            - name: Get package info
              id: package
              run: |
                  PACKAGE_VERSION=$(node -p "require('./package.json').version")
                  PACKAGE_NAME=$(node -p "require('./package.json').name")
                  echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
                  echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
                  echo "filename=${PACKAGE_NAME}-${PACKAGE_VERSION}.vsix" >> $GITHUB_OUTPUT

            - name: Publish to VS Code Marketplace
              id: publish
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}
              run: |
                  set +e
                  MAX_ATTEMPTS=3
                  ATTEMPT=0
                  SKIPPED="false"
                  while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
                    ATTEMPT=$((ATTEMPT + 1))
                    echo "::group::Publish attempt $ATTEMPT/$MAX_ATTEMPTS"
                    OUTPUT=$(npx vsce publish --allow-all-proposed-apis --pat $VSCE_PAT 2>&1)
                    EXIT_CODE=$?
                    echo "$OUTPUT"
                    echo "::endgroup::"
                    if [ $EXIT_CODE -eq 0 ]; then
                      break
                    fi
                    if echo "$OUTPUT" | grep -qiE "already exists"; then
                      echo "::warning::Marketplace version already exists, skipping publish but continuing workflow"
                      SKIPPED="true"
                      break
                    fi
                    if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                      echo "::warning::Publish failed (exit $EXIT_CODE), retrying ($ATTEMPT/$MAX_ATTEMPTS)..."
                      sleep 15
                    else
                      echo "::error::Publish failed after $MAX_ATTEMPTS attempts"
                      echo "$OUTPUT" >&2
                      exit $EXIT_CODE
                    fi
                  done
                  echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT

            - name: Extract changelog for release
              run: |
                  RELEASE_TAG="${{ github.event.release.tag_name }}"
                  VERSION="${RELEASE_TAG#v}"
                  node scripts/extract-changelog.mjs "$VERSION" > /tmp/release_body.md

            - name: Update release body
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release edit "${{ github.event.release.tag_name }}" \
                      --notes-file /tmp/release_body.md

            - name: Upload VSIX as release asset
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: ${{ steps.package.outputs.filename }}
                  token: ${{ secrets.GITHUB_TOKEN }}
